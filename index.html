<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Fullscreen</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

<iframe
    src="https://www.youtube.com/watch?v=RHvXimr2Ga4?autoplay=1&mute=1&controls=0&rel=0"
    allow="autoplay; fullscreen"
    allowfullscreen>
</iframe>

<script>
    // Solicita tela cheia ao primeiro clique do usuário
    document.body.addEventListener("click", () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        }
    }, { once: true });
</script>

</body>
</html>
